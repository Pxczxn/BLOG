# 功能：配置项。
spring:
  application:
    name: back-blog
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: true
    encoding: UTF-8
  messages:
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:10MB}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  device:
    limit: ${JWT_DEVICE_LIMIT:3}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS}
  security:
    cookie-secure: true
  admin:
    initial:
      username: ${INITIAL_ADMIN_USERNAME:}
      email: ${INITIAL_ADMIN_EMAIL:}
      password: ${INITIAL_ADMIN_PASSWORD:}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json

logging:
  level:
    root: INFO
    com.pxczxn.blog: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"
  file:
    name: logs/application.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 10GB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
      roles: ADMIN
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    probes:
      enabled: true
    db:
      enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

file:
  upload-dir: ${FILE_UPLOAD_DIR:/app/blog/upload}

