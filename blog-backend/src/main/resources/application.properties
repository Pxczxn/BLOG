# 功能：配置项。
spring.application.name=back-blog
spring.config.import=optional:file:.env[.properties]

# Server
server.port=4002

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4000,http://localhost:4001}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pxczxn-blog?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:pxczxn}
spring.datasource.password=${DB_PASSWORD:pxczxn}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Encoding
spring.messages.encoding=UTF-8
spring.flyway.encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JWT
jwt.secret=${JWT_SECRET:dev-secret-key-please-change-in-production-environment-at-least-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.device.limit=${JWT_DEVICE_LIMIT:3}
app.security.cookie-secure=${COOKIE_SECURE:false}

# Logging
logging.level.com.pxczxn.blog=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.probes.enabled=true

# Multipart
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:10MB}

# Upload
file.upload-dir=${FILE_UPLOAD_DIR:./upload}

