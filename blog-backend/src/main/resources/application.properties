spring.application.name=back-blog
#spring.profiles.active=prod  # 开发环境注释此行，使用默认配置

# CORS Configuration (开发环境)
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/pxczxn-blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=pxczxn
spring.datasource.password=pxczxn
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=my-very-secure-secret-key-for-jwt-token-generation-min-32-chars
jwt.expiration=86400000

# Device Limit
jwt.device.limit=3
app.security.cookie-secure=false

# Logging
logging.level.com.pxczxn.blog=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.probes.enabled=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload Directory Configuration
file.upload-dir=${FILE_UPLOAD_DIR:./upload}
