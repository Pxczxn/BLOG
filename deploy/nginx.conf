server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    root /app/blog/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /admin-pxczxn/ {
        root /app/blog/frontend;
        try_files $uri $uri/ /admin-pxczxn/index.html;
    }

    location /admin-pxczxn/assets/ {
        root /app/blog/frontend;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location /uploads/ {
        alias /app/blog/upload/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/your-domain_access.log;
    error_log /var/log/nginx/your-domain_error.log;
}
